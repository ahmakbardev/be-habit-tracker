name: Deploy to Production (Hostinger)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, mongodb
          coverage: none

      - name: Verify Server Environment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          timeout: 60s
          script: |
            echo "--- Server Environment Check ---"
            php -v
            git --version
            mkdir -p /home/u723134020/domains/api-ht.ahmakbar.space/
            echo "-------------------------------"

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --ignore-platform-reqs

      - name: Create Deployment Artifact
        run: |
          tar --exclude=.git --exclude=node_modules --exclude=storage/*.log -czf deploy.tar.gz .

      - name: Upload to Server (SFTP/SSH)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          timeout: 60s
          source: "deploy.tar.gz"
          target: "/home/u723134020/domains/api-ht.ahmakbar.space/"

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          timeout: 60s
          command_timeout: 20m
          script: |
            cd /home/u723134020/domains/api-ht.ahmakbar.space/ || exit 1
            
            # Tambahkan safe directory untuk git agar tidak error permission
            git config --global --add safe.directory /home/u723134020/domains/api-ht.ahmakbar.space
            
            # Case: Clone jika belum ada, Pull jika sudah ada
            if [ ! -d ".git" ]; then
                echo "Repository not found. Cloning directly..."
                # Kita clone ke folder saat ini (pastikan folder kosong atau gunakan git init logic)
                git clone https://github.com/ahmakbardev/be-habit-tracker.git .
            else
                echo "Repository found. Pulling latest changes..."
                git fetch origin main
                git reset --hard origin/main
            fi

            # Extract tarball untuk vendor & file terbaru dari GitHub Runner
            if [ -f "deploy.tar.gz" ]; then
                echo "Extracting deployment artifact..."
                tar -xzf deploy.tar.gz
                rm deploy.tar.gz
            fi
            
            # Setup Environment & Optimasi Laravel
            echo "Running Laravel optimizations..."
            php artisan migrate --force || echo "Migration failed, check database"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Kasus public_html: Kita pastikan ini adalah SYMLINK ke public
            echo "Checking public_html status..."
            if [ -d "public_html" ] && [ ! -L "public_html" ]; then
                echo "public_html is a physical directory. Moving to backup..."
                mv public_html public_html_backup_$(date +%F_%H%M%S)
            fi
            
            # Buat atau update symlink
            ln -sfn $(pwd)/public $(pwd)/public_html
            echo "Symlink updated: public_html -> public"
            
            # Fix permissions
            chmod -R 775 storage bootstrap/cache
