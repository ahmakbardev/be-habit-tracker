name: Deploy to Production (Hostinger)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, mongodb
          coverage: none

      - name: Verify Server Environment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          timeout: 60s
          script: |
            echo "--- Lokasi Binary di Server ---"
            which php || echo "php tidak ditemukan"
            which git || echo "git tidak ditemukan"
            which composer || echo "composer tidak ditemukan"
            php -v
            composer -v
            echo "-------------------------------"
            mkdir -p /home/u723134020/domains/api-ht.ahmakbar.space/

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --ignore-platform-reqs

      - name: Create Deployment Artifact
        run: |
          tar -czf deploy.tar.gz . --exclude=.git --exclude=node_modules --exclude=storage/*.log

      - name: Upload to Server (SFTP/SSH)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          timeout: 60s
          source: "deploy.tar.gz"
          target: "/home/u723134020/domains/api-ht.ahmakbar.space/"

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          timeout: 60s
          command_timeout: 20m
          script: |
            cd /home/u723134020/domains/api-ht.ahmakbar.space/
            
            # Perbaikan: Menggunakan git init jika folder tidak kosong (karena git clone . sering gagal di folder yang sudah ada isinya)
            if [ ! -d ".git" ]; then
                echo "Repository not found. Initializing..."
                git init
                # Menggunakan token github untuk auth jika repo privat
                git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
                git fetch
                git checkout -f main
            else
                echo "Repository found. Resetting and pulling latest changes..."
                git fetch origin main
                git reset --hard origin/main
            fi

            # Extract tarball untuk update vendor & file terbaru
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            
            # Setup Environment & Optimasi
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Symlink Laravel public -> public_html khusus Hostinger
            if [ -d "public_html" ] && [ ! -L "public_html" ]; then
                mv public_html public_html_backup_$(date +%F_%H%M%S)
            fi
            
            # Buat/Re-link Symlink
            ln -sfn $(pwd)/public $(pwd)/public_html
            
            # Fix permissions
            chmod -R 775 storage bootstrap/cache
