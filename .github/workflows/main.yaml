name: Deploy to Production (Hostinger)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, mongodb
          coverage: none

      - name: Test SSH Connection (Verify Credentials)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          timeout: 60s
          command_timeout: 10m
          script: |
            echo "--- Verifikasi Koneksi Server ---"
            echo "Koneksi SSH Berhasil!"
            echo "User: $(whoami)"
            mkdir -p /home/u723134020/domains/api-ht.ahmakbar.space/
            cd /home/u723134020/domains/api-ht.ahmakbar.space/
            echo "Current Directory: $(pwd)"
            echo "---------------------------------"

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --ignore-platform-reqs --ignore-platform-reqs

      - name: Create Deployment Artifact
        run: |
          tar -czf deploy.tar.gz . --exclude=.git --exclude=node_modules --exclude=storage/*.log

      - name: Upload to Server (SFTP/SSH)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          timeout: 60s
          command_timeout: 15m
          source: "deploy.tar.gz"
          target: "/home/u723134020/domains/api-ht.ahmakbar.space/"

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          timeout: 60s
          command_timeout: 20m
          script: |
            cd /home/u723134020/domains/api-ht.ahmakbar.space/
            
            # Case: Clone jika belum ada, Pull jika sudah ada
            if [ ! -d ".git" ]; then
                echo "Repository not found. Cloning..."
                git clone https://github.com/${{ github.repository }}.git .
            else
                echo "Repository found. Pulling latest changes..."
                git pull origin main
            fi

            # Extract tarball
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            
            # Setup Environment & Optimasi
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Symlink Laravel public -> public_html khusus Hostinger
            if [ -d "public_html" ] && [ ! -L "public_html" ]; then
                mv public_html public_html_backup_$(date +%F_%H%M%S)
            fi
            
            # Buat/Re-link Symlink
            ln -sfn $(pwd)/public $(pwd)/public_html
            
            # Fix permissions
            chmod -R 775 storage bootstrap/cache
