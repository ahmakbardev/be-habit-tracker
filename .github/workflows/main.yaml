name: Deploy to Production (Hostinger)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, mongodb
          coverage: none

      - name: Verify Server Environment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          timeout: 60s
          script: |
            echo "--- Server Environment Check ---"
            php -v
            git --version
            mkdir -p /home/u723134020/domains/api-ht.ahmakbar.space/
            echo "-------------------------------"

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --ignore-platform-reqs

      - name: Create Deployment Artifact
        run: |
          tar -czf deploy.tar.gz . --exclude=.git --exclude=node_modules --exclude=storage/*.log || true

      - name: Upload to Server (SFTP/SSH)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          timeout: 60s
          source: "deploy.tar.gz"
          target: "/home/u723134020/domains/api-ht.ahmakbar.space/"

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          timeout: 60s
          command_timeout: 20m
          script: |
            cd /home/u723134020/domains/api-ht.ahmakbar.space/ || exit 1
            
            # 1. Clone/Pull ke folder project khusus
            if [ ! -d "be-habit-tracker" ]; then
                echo "Cloning repository into be-habit-tracker..."
                git clone https://github.com/ahmakbardev/be-habit-tracker.git be-habit-tracker
            else
                echo "Project folder exists. Syncing..."
                cd be-habit-tracker
                git config --global --add safe.directory $(pwd)
                git fetch origin main
                git reset --hard origin/main
                cd ..
            fi

            # 2. Extract vendor & files terbaru ke dalam folder project
            if [ -f "deploy.tar.gz" ]; then
                echo "Extracting deployment artifact into be-habit-tracker..."
                # Gunakan -C untuk extract langsung ke folder project
                tar -xzf deploy.tar.gz -C be-habit-tracker
                rm deploy.tar.gz
            fi
            
            # 3. Jalankan Artisan di dalam folder project
            cd be-habit-tracker
            echo "Running Laravel optimizations..."
            php artisan migrate --force || echo "Migration failed"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            chmod -R 775 storage bootstrap/cache
            cd ..
            
            # 4. Manage Symlink: public_html -> be-habit-tracker/public
            echo "Checking public_html symlink..."
            if [ -d "public_html" ] && [ ! -L "public_html" ]; then
                echo "Moving physical public_html to backup..."
                mv public_html public_html_backup_$(date +%F_%H%M%S)
            fi
            
            # Buat symlink menggunakan absolute path agar aman
            ln -sfn $(pwd)/be-habit-tracker/public $(pwd)/public_html
            echo "Deployment finished successfully!"
